<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>回復記録</title>
  <style>
    body { margin:0; padding:0; background:#000; color:#ddd; font-family:'Courier New',monospace; font-size:0.9rem; overflow-y:auto; transition:background-color 0.5s; }
    .terminal { padding:40px; max-width:700px; margin:0 auto; position:relative; z-index:1; }
    .terminal-line { opacity:0; transition:opacity 0.2s; margin:2px 0; }
    .terminal-line.visible { opacity:1; }
    .terminal-line.status-ok { color:#aaa; }
    .terminal-line.status-ok .ok-text { color:#4a4; text-shadow:0 0 8px rgba(0,255,0,0.4),0 0 2px rgba(0,255,0,0.2); }
    .terminal-line.status-fail { color:#c44; font-weight:bold; text-shadow:0 0 10px rgba(255,0,0,0.5); }
    .terminal-line.system-msg { color:#888; margin-top:12px; margin-bottom:12px; }
    .noise-overlay { position:fixed; top:0;left:0; width:100%;height:100%; pointer-events:none; z-index:10; opacity:0; background-image:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200"><filter id="n"><feTurbulence baseFrequency="0.8" numOctaves="4" stitchTiles="stitch"/></filter><rect width="200" height="200" filter="url(%23n)" opacity="0.15"/></svg>'); mix-blend-mode:overlay; }
    .noise-overlay.active { animation:noise-flicker 0.15s infinite; }
    @keyframes noise-flicker { 0%{opacity:0.3;} 50%{opacity:0.5;} 100%{opacity:0.2;} }
    @keyframes red-flash { 0%{background-color:#300;} 100%{background-color:#000;} }
    .red-flash { animation:red-flash 0.5s ease-out; }
    @keyframes shake { 0%,100%{transform:translateX(0);} 10%{transform:translateX(-3px);} 20%{transform:translateX(3px);} 30%{transform:translateX(-2px);} 40%{transform:translateX(2px);} 50%{transform:translateX(-1px);} }
    .shake { animation:shake 0.5s ease-out; }
    @keyframes blink-cursor { 0%,100%{opacity:1;} 50%{opacity:0;} }
    .cursor-blink::after { content:'█'; animation:blink-cursor 0.8s infinite; color:#666; }
    .terminal-line.fade-out { transition:opacity 2s; opacity:0.05 !important; }
    .terminal-line.status-fail.last-remaining { transition:opacity 0s; opacity:1 !important; }
  </style>
</head>
<body>
  <div class="noise-overlay" id="noise-overlay"></div>
  <div class="terminal" id="terminal"></div>
  <script>
  if (!localStorage.getItem('night5_cleared')) { location.href = '../index.html'; }

  var terminal = document.getElementById('terminal');
  var noiseOverlay = document.getElementById('noise-overlay');

  var subjects = [
    {no:'001',id:'K-009'},{no:'002',id:'K-018'},{no:'003',id:'K-019'},
    {no:'004',id:'K-024'},{no:'005',id:'K-032'},{no:'006',id:'K-041'},
    {no:'007',id:'K-047'},{no:'008',id:'K-003'},{no:'009',id:'K-005'},
    {no:'010',id:'K-007'},{no:'011',id:'K-010'},{no:'012',id:'K-012'},
    {no:'013',id:'K-014'},{no:'014',id:'K-016'},{no:'015',id:'K-020'},
    {no:'016',id:'K-021'},{no:'017',id:'K-023'},{no:'018',id:'K-025'},
    {no:'019',id:'K-026'},{no:'020',id:'K-028'},{no:'021',id:'K-029'},
    {no:'022',id:'K-030'},{no:'023',id:'K-033'},{no:'024',id:'K-034'},
    {no:'025',id:'K-036'},{no:'026',id:'K-037'},{no:'027',id:'K-038'},
    {no:'028',id:'K-039'},{no:'029',id:'K-040'},{no:'030',id:'K-042'},
    {no:'031',id:'K-043'},{no:'032',id:'K-044'},{no:'033',id:'K-045'},
    {no:'034',id:'K-046'},{no:'035',id:'K-048'},{no:'036',id:'K-049'},
    {no:'037',id:'K-050'},{no:'038',id:'K-051'},{no:'039',id:'K-052'},
    {no:'040',id:'K-053'},{no:'041',id:'K-054'},{no:'042',id:'K-055'},
    {no:'043',id:'K-056'},{no:'044',id:'K-057'},{no:'045',id:'K-058'},
    {no:'046',id:'K-???'},{no:'047',id:'K-???'},
    {no:'048',id:'S-003'},{no:'049',id:'S-007'},
    {no:'050',id:'S-012',name:'悠具志 業',fail:true}
  ];

  function addLine(html, cls) {
    var line = document.createElement('div');
    line.className = 'terminal-line ' + (cls||'');
    line.innerHTML = html;
    terminal.appendChild(line);
    requestAnimationFrame(function(){ line.classList.add('visible'); });
    terminal.scrollTop = terminal.scrollHeight;
    window.scrollTo(0, document.body.scrollHeight);
    return line;
  }

  function sleep(ms) { return new Promise(function(r){setTimeout(r,ms);}); }

  function setBgColor(color) { document.body.style.backgroundColor = color; }

  async function runSequence() {
    addLine('実験パターン解除プロセス...完了', 'system-msg');
    await sleep(2000);
    addLine('被験者状態を更新しています...', 'system-msg');
    await sleep(2000);
    addLine('', '');
    await sleep(500);

    var totalNormal = subjects.filter(function(s){return !s.fail;}).length;

    for (var i = 0; i < subjects.length; i++) {
      var s = subjects[i];

      if (s.fail) {
        // 段階B：停止
        document.body.style.transition = 'background-color 0.5s';
        setBgColor('#000');

        noiseOverlay.classList.add('active');

        var waitingLine = addLine(s.no + ' | ' + s.id + ' ... ', 'status-ok cursor-blink');
        await sleep(3000);
        await sleep(3000);

        noiseOverlay.classList.remove('active');
        waitingLine.remove();

        document.body.classList.add('red-flash');
        addLine(s.no + ' | ' + s.id + ' ... ' + s.name + '\u3000\u2500\u2500\u3000変化なし', 'status-fail shake');

        await sleep(600);
        document.body.classList.remove('red-flash');

      } else {
        var delay;
        if (i < 3) delay = 1500 - (i * 150);
        else if (i < 10) delay = 800 - (i * 30);
        else if (i < 30) delay = 300;
        else delay = 100;

        addLine(s.no + ' | ' + s.id + ' ... <span class="ok-text">正常化</span>', 'status-ok');

        var progress = i / totalNormal;
        var r = Math.floor(0 + progress * 10);
        var g = Math.floor(0 + progress * 26);
        var b = Math.floor(0 + progress * 58);
        document.body.style.transition = 'background-color 0.3s';
        setBgColor('rgb(' + r + ',' + g + ',' + b + ')');

        await sleep(Math.max(delay, 80));
      }
    }

    // 段階C：静寂→フェードアウト
    await sleep(3000);

    var allLines = terminal.querySelectorAll('.terminal-line');
    allLines.forEach(function(line) {
      if (!line.classList.contains('status-fail')) {
        line.classList.add('fade-out');
      } else {
        line.classList.add('last-remaining');
      }
    });

    await sleep(3000);

    var failLine = terminal.querySelector('.status-fail');
    if (failLine) {
      failLine.style.transition = 'opacity 2s';
      failLine.style.opacity = '0';
    }

    await sleep(2500);

    document.body.style.transition = 'opacity 2s';
    document.body.style.opacity = '0';
    await sleep(2500);

    window.location.href = 'complete.html';
  }

  window.addEventListener('load', function(){ setTimeout(runSequence, 1000); });
  </script>
</body>
</html>
