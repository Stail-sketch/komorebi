<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ - こもれびゆうえんち 公式アーカイブ</title>
  <link rel="stylesheet" href="css/official.css">
  <style>
    .glitch-effect { animation: glitch 0.3s infinite; }
    @keyframes glitch { 0%{filter:none;} 25%{filter:hue-rotate(90deg) saturate(3);} 50%{filter:invert(1);} 75%{filter:hue-rotate(270deg) contrast(2);} 100%{filter:none;} }
    .night-entrance-overlay { position:fixed; top:0;left:0;right:0;bottom:0; background:rgba(0,0,0,0.95); display:flex; align-items:center; justify-content:center; z-index:9999; color:#ccc; font-size:1.2rem; letter-spacing:0.1em; font-family:monospace; }
  </style>
<link rel="stylesheet" href="/css/corrupted.css">
<script src="/js/corrupted.js" defer></script>
</head>
<body>
  <!-- 雲 -->
  <div class="cloud cloud-1"></div>
  <div class="cloud cloud-2"></div>
  <div class="cloud cloud-3"></div>

  <header class="official-header">
    <div class="header-row">
      <div class="header-chars-left"><img src="../images/characters/kitsune_normal.png" alt="キツネ団長"><img src="../images/characters/kaa_normal.png" alt="かあ博士"></div>
      <div class="header-title-area">
        <div class="logo"><img src="../images/rogo.png" alt="こもれびゆうえんち" class="logo-img"></div>
      </div>
      <div class="header-chars-right"><img src="../images/characters/potamaru_normal.png" alt="ぽたまる"><img src="../images/characters/ukkichi_normal.png" alt="うっきち"></div>
    </div>
  </header>

  <nav class="official-nav">
    <a href="index.html">トップ</a>
    <a href="about.html">番組紹介</a>
    <a href="characters/index.html">キャラクター</a>
    <a href="staff.html">スタッフ</a>
    <a href="episodes.html">放送リスト</a>
    <a href="contact.html">お問い合わせ</a>
  </nav>

  <main class="official-main">
    <h2 class="section-title">お問い合わせ</h2>

    <p>番組に関するお問い合わせは、下記のフォームよりお送りください。</p>

    <hr style="border:none; border-top:1px solid #eee; margin:20px 0;">

    <form id="contact-form" onsubmit="return handleContactSubmit(event)">
      <div class="form-group">
        <label for="name">お名前：</label>
        <input type="text" id="name" name="name">
      </div>

      <div class="form-group">
        <label for="email">ご連絡先（メール）：</label>
        <input type="email" id="email" name="email">
      </div>

      <div class="form-group">
        <label>お問い合わせ種別：</label>
        <div class="radio-group">
          <label><input type="radio" name="type" value="program"> 番組について</label>
          <label><input type="radio" name="type" value="recording"> 収録参加について</label>
          <label><input type="radio" name="type" value="other"> その他</label>
        </div>
      </div>

      <div class="form-group">
        <label for="message">お問い合わせ内容：</label>
        <textarea id="message" name="message" rows="5"></textarea>
      </div>

      <button type="submit" class="form-submit">送信する</button>
    </form>

    <div id="form-result"></div>

    <hr style="border:none; border-top:1px solid #eee; margin:20px 0;">

    <p style="font-size:11px; color:#999;">
      ※お返事までに1〜2週間程度お時間をいただくことがございます。<br>
      ※いただいた個人情報は、お問い合わせへの対応以外の目的では使用いたしません。
    </p>
  </main>

  <footer class="official-footer">
    <div class="footer-message">またあそびにきてね！</div>
    <p>「こもれびゆうえんち」</p>
    <p>制作：株式会社ゆめスタジオプロダクション</p>
    <p>放送：きらら放送</p>
    <p>&copy; YUME STUDIO PRODUCTION / KIRARA BROADCASTING</p>
  </footer>

  <script>
    // ミスカウンター
    var missCount = parseInt(localStorage.getItem('night5_form_misses') || '0', 10);

    function handleContactSubmit(event) {
      event.preventDefault();

      var email = document.getElementById('email').value.trim().toLowerCase();
      var typeRadios = document.getElementsByName('type');
      var selectedType = '';
      for (var i = 0; i < typeRadios.length; i++) {
        if (typeRadios[i].checked) { selectedType = typeRadios[i].value; break; }
      }
      var content = document.getElementById('message').value.trim();

      // Night5入口判定（Night4クリア後のみ）
      if (
        email === 'k-project@yume-studio.co.jp' &&
        selectedType === 'recording' &&
        content.indexOf('初期構想') !== -1 &&
        localStorage.getItem('night4_cleared') === 'true' &&
        !localStorage.getItem('night5_cleared')
      ) {
        localStorage.removeItem('night5_form_misses');
        triggerNight5Entrance();
        return false;
      }

      // ミスカウント加算
      missCount++;
      localStorage.setItem('night5_form_misses', missCount.toString());

      // 段階的ヒント
      var resultDiv = document.getElementById('form-result');
      var msg = '申し訳ございません。現在お問い合わせは受け付けておりません。';

      if (missCount >= 9) {
        msg = 'プロジェクト関連資料と内部メモをもう一度お読みください。';
      } else if (missCount >= 6) {
        msg = '内部資料に記載の宛先・種別・件名をご確認ください。';
      } else if (missCount >= 3) {
        msg = '……送信先が異なるようです。';
      }

      resultDiv.textContent = msg;
      resultDiv.style.display = 'block';
      return false;
    }

    function triggerNight5Entrance() {
      document.body.style.pointerEvents = 'none';
      document.body.classList.add('glitch-effect');
      setTimeout(function() {
        document.body.classList.remove('glitch-effect');
        var overlay = document.createElement('div');
        overlay.className = 'night-entrance-overlay';
        overlay.innerHTML = '<p>── アクセスを許可します ──</p>';
        document.body.appendChild(overlay);
        setTimeout(function() {
          window.location.href = '../game/night5.html';
        }, 2500);
      }, 1500);
    }
  </script>
</body>
</html>
