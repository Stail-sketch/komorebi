<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PROTOCOL_NIGHT6_ACCESS</title>
  <style>
    body { margin:0; padding:0; background:#0a0a0a; color:#0f0; font-family:'Courier New',monospace; font-size:0.85rem; line-height:1.6; }
    body::after { content:''; position:fixed; top:0;left:0; width:100%;height:100%; pointer-events:none; z-index:9998; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,0,0.03) 2px,rgba(0,255,0,0.03) 4px); }
    .terminal { max-width:800px; margin:0 auto; padding:30px 40px; }
    .terminal-header { color:#0a0; font-size:0.75rem; border-bottom:1px solid #0a0; padding-bottom:10px; margin-bottom:20px; }
    h1 { color:#0f0; font-size:1.1rem; margin:0 0 20px; }
    p { margin:0 0 12px; }
    a { color:#0cf; }
    a:hover { color:#0ff; }
    .redacted { background:#0f0; color:#0f0; padding:0 2px; }
    .warning { color:#f44; }
    .dim { color:#050; }
    .back-link { margin-top:30px; display:block; color:#0a0; font-size:0.8rem; }
    .locked { color:#f44; text-align:center; padding:40px; font-size:1.1rem; }
    .unlocked { color:#0f0; text-align:center; padding:40px; }
    #proceed-btn { background:#020; color:#0f0; border:1px solid #0f0; padding:12px 30px; font-family:monospace; font-size:1rem; cursor:pointer; margin-top:20px; }
    #proceed-btn:hover { background:#040; }
  </style>
</head>
<body>
<div class="terminal">
  <div class="terminal-header">ゆめスタジオ内部システム // アクセスレベル：制限付き // セッション：████████</div>
  <h1>> アクセスターミナル</h1>
  <div id="access-status">
    <div class="locked">
      <p>> アクセスターミナル // 状態：確認中...</p>
    </div>
  </div>
</div>
<script>
localStorage.setItem('arg_s4', 'true');
if (!localStorage.getItem('night5_cleared')) { location.href = '../index.html'; }

var flags = ['arg_q0','arg_q1','arg_q2','arg_q3','arg_q4','arg_q5','arg_q6',
             'arg_r0','arg_r1','arg_r2','arg_r3','arg_r4','arg_r5','arg_r6',
             'arg_s0','arg_s1','arg_s2','arg_s3','arg_s4','arg_s5'];
var count = 0;
flags.forEach(function(f) { if (localStorage.getItem(f)) count++; });

var statusEl = document.getElementById('access-status');
if (count >= 20) {
  statusEl.innerHTML = '<div class="unlocked"><p>> アクセスターミナル // 状態：解除済み</p><p>全システムファイルの確認が完了しました。</p><button id="proceed-btn" onclick="location.href=\'/game/night6.html\'">NIGHT 6 へ進む</button></div>';
} else {
  statusEl.innerHTML = '<div class="locked"><p>> アクセスターミナル // 状態：ロック中</p><p>閲覧済みページ数：' + count + ' / 20</p><p class="dim">全てのシステムファイルを閲覧してください。</p></div>';
}
</script>
</body>
</html>
