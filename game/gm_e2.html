<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#000; color:#fff; font-family:'Courier New',monospace; overflow:hidden; min-height:100vh; display:flex; align-items:center; justify-content:center; }
    #stage { width:100vw; height:100vh; display:flex; align-items:center; justify-content:center; position:relative; }
    .fade-text { opacity:0; transition:opacity 2s; text-align:center; position:absolute; }
    .fade-text.visible { opacity:1; }
    .typewriter { font-size:1.6rem; letter-spacing:0.15em; }
    .typewriter .char { opacity:0; display:inline-block; }
    .typewriter .char.visible { opacity:1; }
    .teaser-text { font-family:'Courier New',monospace; color:#4a4; opacity:0; transition:opacity 2s; }
    #snow-canvas { position:fixed; top:0;left:0; width:100%;height:100%; z-index:200; pointer-events:none; opacity:0; }
  </style>
</head>
<body>
<canvas id="snow-canvas"></canvas>
<div id="stage"></div>
<script>
function sleep(ms){return new Promise(function(r){setTimeout(r,ms);});}

var stage = document.getElementById('stage');
function clearStage() { stage.innerHTML = ''; }

function showText(text, cls, extra) {
  var el = document.createElement('div');
  el.className = 'fade-text ' + (cls||'');
  if (extra) Object.assign(el.style, extra);
  el.textContent = text;
  stage.appendChild(el);
  requestAnimationFrame(function(){ el.classList.add('visible'); });
  return el;
}

async function typeWriter(el, text, delay) {
  el.innerHTML = '';
  for (var i = 0; i < text.length; i++) {
    var span = document.createElement('span');
    span.className = 'char';
    span.textContent = text[i] === ' ' ? '\u00A0' : text[i];
    el.appendChild(span);
  }
  var chars = el.querySelectorAll('.char');
  for (var i = 0; i < chars.length; i++) {
    chars[i].classList.add('visible');
    await sleep(delay || 100);
  }
}

// 砂嵐
var snowCanvas = document.getElementById('snow-canvas');
var snowCtx = snowCanvas.getContext('2d');
var snowActive = false;
function resizeCanvas(){ snowCanvas.width=window.innerWidth; snowCanvas.height=window.innerHeight; }
resizeCanvas(); window.addEventListener('resize', resizeCanvas);
function drawSnow(){ if(!snowActive)return; var w=snowCanvas.width,h=snowCanvas.height,d=snowCtx.createImageData(w,h),p=d.data; for(var i=0;i<p.length;i+=4){var v=Math.random()*255;p[i]=v;p[i+1]=v;p[i+2]=v;p[i+3]=255;} snowCtx.putImageData(d,0,0); requestAnimationFrame(drawSnow); }
function startSnow(o){ snowCanvas.style.opacity=o||'0.8'; snowActive=true; drawSnow(); }
function stopSnow(){ snowActive=false; snowCanvas.style.opacity='0'; }

async function yoteidooriEnding() {
  localStorage.setItem('yoteidoori_cleared', 'true');

  // 6AM
  await sleep(1000);
  var am = showText('6 AM', '', {fontSize:'2rem', letterSpacing:'0.2em'});
  await sleep(3000);
  am.style.opacity = '0';
  await sleep(2000);
  clearStage();

  // ホワイトアウト
  document.body.style.transition = 'background 3s';
  document.body.style.background = '#fff';
  await sleep(3000);

  // チャイム＋歓声を同時再生
  var chime = new Audio('sound/clear_chime.mp3');
  chime.volume = 0.04;
  chime.play().catch(function(){});
  var yay = new Audio('sound/clear_yay.mp3');
  yay.volume = 0.02;
  yay.play().catch(function(){});

  // ALL CLEAR タイプライター（チャイム＋歓声の中で）
  await sleep(1000);
  var titleEl = document.createElement('div');
  titleEl.className = 'fade-text typewriter visible';
  titleEl.style.position = 'absolute';
  stage.appendChild(titleEl);
  await typeWriter(titleEl, '全夜クリア', 100);
  await sleep(500);
  titleEl.style.textShadow = '0 0 15px rgba(0,0,0,0.3)';
  await sleep(1500);

  // THANK YOU FOR PLAYING
  showText('\u30d7\u30ec\u30a4\u3057\u3066\u304f\u308c\u3066\u3042\u308a\u304c\u3068\u3046', '', {marginTop:'80px', color:'#666', fontSize:'1rem', letterSpacing:'0.1em'});
  await sleep(5000);

  // テキスト消す
  stage.querySelectorAll('.fade-text').forEach(function(el){ el.style.opacity='0'; });
  await sleep(2000);
  clearStage();

  // ⑦ 歓声が歪んで消える
  var distortStart = Date.now();
  var distortDuration = 3500;
  function distortAudio() {
    var elapsed = Date.now() - distortStart;
    var progress = Math.min(elapsed / distortDuration, 1);
    yay.playbackRate = 1.0 - (progress * 0.8);
    yay.volume = Math.max(0.02 * (1 - progress), 0);
    if (progress < 1) { requestAnimationFrame(distortAudio); } else { yay.pause(); }
  }
  distortAudio();
  await sleep(4000);

  // 白い画面＋沈黙（少し長めに溜める）
  await sleep(4000);

  // ⑧前半 ジャンプスケア
  document.body.style.transition = 'none';
  document.body.style.background = '#000';

  var jumpscare = document.createElement('img');
  jumpscare.src = '../official/assets/images/unknown_entity.png';
  jumpscare.style.cssText = 'position:fixed;top:0;left:0;width:100vw;height:100vh;object-fit:cover;z-index:10000;';
  document.body.appendChild(jumpscare);

  var scareFiles = ['sound/kitsune_jumpscare.mp3','sound/kaa_jumpscare.wav','sound/potamaru_jumpscare.mp3','sound/ukkichi_jumpscare.ogg','sound/shisaku_jumpscare.wav'];
  scareFiles.forEach(function(f) {
    var a = new Audio(f);
    a.volume = 0.015;
    a.play().catch(function(){});
  });

  await sleep(1000);
  jumpscare.remove();

  // ⑧後半 砂嵐
  startSnow(0.85);
  await sleep(500);

  // ⑨ 砂嵐の裏で「予定通り」を配置
  var finalMsg = document.createElement('div');
  finalMsg.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:#000;display:flex;align-items:center;justify-content:center;z-index:9999;';
  finalMsg.innerHTML = '<p style="font-family:\'Courier New\',monospace;font-size:1.1rem;color:#888;letter-spacing:0.1em;">おめでとう。予定通りです。</p>';
  document.body.appendChild(finalMsg);

  await sleep(1000);
  stopSnow();

  // 5秒表示
  await sleep(5000);

  // フェードアウト
  finalMsg.style.transition = 'opacity 2s';
  finalMsg.style.opacity = '0';
  await sleep(2500);
  finalMsg.remove();

  // ティーザー
  var teaser = document.createElement('div');
  teaser.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;font-family:\'Courier New\',monospace;color:#4a4;';

  var log1 = document.createElement('p');
  log1.className = 'teaser-text';
  log1.style.fontSize = '0.85rem';
  log1.style.marginBottom = '24px';
  log1.textContent = 'LOG_2026.\u2588\u2588.\u2588\u2588_\u2588\u2588:\u2588\u2588:\u2588\u2588';
  teaser.appendChild(log1);

  var log2 = document.createElement('p');
  log2.className = 'teaser-text';
  log2.style.fontSize = '1rem';
  log2.style.marginBottom = '40px';
  log2.textContent = '\u2500\u2500 \u307e\u3060\u3001\u52d5\u3044\u3066\u3044\u308b';
  teaser.appendChild(log2);

  var log3 = document.createElement('p');
  log3.className = 'teaser-text';
  log3.style.fontSize = '0.85rem';
  log3.style.marginBottom = '8px';
  log3.textContent = '\u88ab\u9a13\u8005\u7ba1\u7406\u8a18\u9332 \u66f4\u65b0';
  teaser.appendChild(log3);

  var log4 = document.createElement('p');
  log4.className = 'teaser-text';
  log4.style.fontSize = '0.9rem';
  log4.textContent = 'K-059 | \u2588\u2588\u2588\u2588.\u2588\u2588.\u2588\u2588 | \u2588\u2588';
  teaser.appendChild(log4);

  document.body.appendChild(teaser);

  await sleep(1000);
  log1.style.opacity = '1';
  await sleep(2000);
  log2.style.opacity = '1';
  await sleep(3000);
  log3.style.opacity = '1';
  await sleep(2000);
  log4.style.opacity = '1';
  await sleep(5000);

  teaser.style.transition = 'opacity 3s';
  teaser.style.opacity = '0';
  await sleep(3500);
  teaser.remove();

  // カスタムナイトへ
  window.location.href = 'custom_night.html';
}

window.addEventListener('load', function(){ setTimeout(yoteidooriEnding, 500); });
</script>
</body>
</html>
