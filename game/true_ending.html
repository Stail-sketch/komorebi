<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#000; color:#fff; font-family:'Courier New',monospace; overflow:hidden; min-height:100vh; display:flex; align-items:center; justify-content:center; }
    #stage { width:100vw; height:100vh; display:flex; align-items:center; justify-content:center; position:relative; }
    .fade-text { opacity:0; transition:opacity 2s; text-align:center; position:absolute; }
    .fade-text.visible { opacity:1; }
    .small-text { font-size:0.95rem; color:#aaa; font-family:'Yu Mincho','游明朝',serif; }
    .green-text { color:#4a4; text-shadow:0 0 10px rgba(0,255,0,0.5); }
    .system-text { font-size:0.85rem; color:#888; font-family:'Courier New',monospace; }
  </style>
</head>
<body>
<div id="stage"></div>
<script>
function sleep(ms){return new Promise(function(r){setTimeout(r,ms);});}

var stage = document.getElementById('stage');

function clearStage() { stage.innerHTML = ''; }

function showText(text, cls, extra) {
  var el = document.createElement('div');
  el.className = 'fade-text ' + (cls||'');
  if (extra) Object.assign(el.style, extra);
  el.textContent = text;
  stage.appendChild(el);
  requestAnimationFrame(function(){ el.classList.add('visible'); });
  return el;
}

async function trueEnding() {
  localStorage.setItem('night6_cleared', 'true');

  // ① 6 AM
  await sleep(1000);
  var am = showText('6 AM', '', {fontSize:'2rem', letterSpacing:'0.2em'});
  await sleep(3000);
  am.style.opacity = '0';
  await sleep(2000);
  clearStage();

  // ⑤A 闇の中
  showText('...', 'small-text');
  await sleep(3000);
  clearStage();
  showText('...くらい', 'small-text');
  await sleep(3000);
  clearStage();
  showText('ずっと、くらい', 'small-text');
  await sleep(4000);
  clearStage();

  // ⑤B 声
  showText('...なにか、聞こえる', 'small-text');
  await sleep(5000);
  clearStage();
  showText('だれかの声が、する', 'small-text');
  await sleep(3000);
  clearStage();

  // 2秒後に光が広がって目覚め
  await sleep(2000);
  var light = document.createElement('div');
  light.style.cssText = 'width:4px;height:4px;background:#fff;border-radius:50%;position:absolute;box-shadow:0 0 20px #fff,0 0 40px #fff;transition:all 3s;';
  stage.appendChild(light);
  await sleep(500);
  light.style.width = '300px';
  light.style.height = '300px';
  light.style.boxShadow = '0 0 150px #fff, 0 0 300px #fff';
  await sleep(3000);

  // ⑤C 目覚め
  document.body.style.transition = 'background 2s';
  document.body.style.background = '#fff';
  await sleep(2000);
  clearStage();
  showText('...まぶしい', 'small-text', {color:'#999'});
  await sleep(4000);
  clearStage();
  showText('ここは——', 'small-text', {color:'#999'});
  await sleep(3000);
  clearStage();
  await sleep(3000);

  // ⑤D 確認（重ねて表示・大きめ）
  await sleep(3000);
  showText('被験者管理記録 更新', 'system-text', {fontSize:'1.1rem', marginBottom:'70px'});
  await sleep(2000);
  showText('S-012 | 悠具志 業', 'system-text', {fontSize:'1.2rem', marginBottom:'20px'});
  await sleep(4000);
  showText('状態：──　意識回復', 'green-text', {fontSize:'1.5rem', marginTop:'30px'});
  await sleep(6000);
  clearStage();

  // ⑤E ホワイトアウト
  await sleep(2000);

  // ⑥ 余韻 + NIGHT 6 COMPLETE タイプライター
  document.body.style.transition = 'background 2s';
  document.body.style.background = '#000';
  await sleep(2000);

  // チャイム+歓声を同時再生
  var chime = new Audio('sound/clear_chime.mp3');
  chime.volume = 0.04;
  chime.play().catch(function(){});
  var yay = new Audio('sound/clear_yay.mp3');
  yay.volume = 0.02;
  yay.play().catch(function(){});

  // タイプライター「NIGHT 6 COMPLETE」
  await sleep(1000);
  var titleEl = document.createElement('div');
  titleEl.style.cssText = 'position:absolute;font-size:1.4rem;letter-spacing:0.15em;margin-bottom:40px;';
  stage.appendChild(titleEl);
  var titleText = 'NIGHT 6 COMPLETE';
  for (var ti = 0; ti < titleText.length; ti++) {
    var ts = document.createElement('span');
    ts.style.cssText = 'opacity:0;display:inline-block;color:#e8e4dc;';
    ts.textContent = titleText[ti] === ' ' ? '\u00A0' : titleText[ti];
    titleEl.appendChild(ts);
  }
  var titleChars = titleEl.querySelectorAll('span');
  for (var ti = 0; ti < titleChars.length; ti++) {
    titleChars[ti].style.opacity = '1';
    await sleep(80);
  }

  // タイプライター「おめでとう！」
  await sleep(1000);
  var msgEl = document.createElement('div');
  msgEl.style.cssText = 'position:absolute;font-size:1rem;letter-spacing:0.1em;margin-top:40px;';
  stage.appendChild(msgEl);
  var msgText = 'おめでとう！';
  for (var mi = 0; mi < msgText.length; mi++) {
    var ms = document.createElement('span');
    ms.style.cssText = 'opacity:0;display:inline-block;color:#aaa;';
    ms.textContent = msgText[mi];
    msgEl.appendChild(ms);
  }
  var msgChars = msgEl.querySelectorAll('span');
  for (var mi = 0; mi < msgChars.length; mi++) {
    msgChars[mi].style.opacity = '1';
    await sleep(100);
  }

  // 歓声が流れている間少し待つ
  await sleep(5000);

  // 歓声を普通にフェードアウト
  var fadeInterval = setInterval(function() {
    if (yay.volume > 0.002) {
      yay.volume -= 0.001;
    } else {
      clearInterval(fadeInterval);
      yay.pause();
    }
  }, 100);
  await sleep(3000);

  // カスタムナイトへ遷移
  window.location.href = 'custom_night.html';
}

window.addEventListener('load', function(){ setTimeout(trueEnding, 500); });
</script>
</body>
</html>
