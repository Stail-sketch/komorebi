<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#000; color:#fff; font-family:'Courier New',monospace; overflow:hidden; min-height:100vh; display:flex; align-items:center; justify-content:center; }
    #stage { width:100vw; height:100vh; display:flex; align-items:center; justify-content:center; position:relative; }
    .fade-text { opacity:0; transition:opacity 2s; text-align:center; position:absolute; }
    .fade-text.visible { opacity:1; }
    .small-text { font-size:0.95rem; color:#aaa; font-family:'Yu Mincho','游明朝',serif; }
    .green-text { color:#4a4; text-shadow:0 0 10px rgba(0,255,0,0.5); }
    .system-text { font-size:0.85rem; color:#888; font-family:'Courier New',monospace; }
  </style>
</head>
<body>
<div id="stage"></div>
<script>
function sleep(ms){return new Promise(function(r){setTimeout(r,ms);});}

var stage = document.getElementById('stage');

function clearStage() { stage.innerHTML = ''; }

function showText(text, cls, extra) {
  var el = document.createElement('div');
  el.className = 'fade-text ' + (cls||'');
  if (extra) Object.assign(el.style, extra);
  el.textContent = text;
  stage.appendChild(el);
  requestAnimationFrame(function(){ el.classList.add('visible'); });
  return el;
}

async function trueEnding() {
  localStorage.setItem('night6_cleared', 'true');

  // ① 6 AM
  await sleep(1000);
  var am = showText('6 AM', '', {fontSize:'2rem', letterSpacing:'0.2em'});
  await sleep(3000);
  am.style.opacity = '0';
  await sleep(2000);
  clearStage();

  // ⑤A 闇の中
  showText('...', 'small-text');
  await sleep(3000);
  clearStage();
  showText('...くらい', 'small-text');
  await sleep(3000);
  clearStage();
  showText('ずっと、くらい', 'small-text');
  await sleep(4000);
  clearStage();

  // ⑤B 光の兆し
  showText('...なにか、聞こえる', 'small-text');
  var light = document.createElement('div');
  light.style.cssText = 'width:4px;height:4px;background:#fff;border-radius:50%;position:absolute;box-shadow:0 0 20px #fff,0 0 40px #fff;transition:all 3s;';
  stage.appendChild(light);
  await sleep(5000);
  clearStage();
  showText('だれかの声が、する', 'small-text');
  light = document.createElement('div');
  light.style.cssText = 'width:4px;height:4px;background:#fff;border-radius:50%;position:absolute;box-shadow:0 0 20px #fff,0 0 40px #fff;transition:all 3s;';
  stage.appendChild(light);
  await sleep(1000);
  light.style.width = '200px';
  light.style.height = '200px';
  light.style.boxShadow = '0 0 100px #fff, 0 0 200px #fff';
  await sleep(4000);
  clearStage();

  // ⑤C 目覚め
  showText('...まぶしい', 'small-text', {color:'#999'});
  document.body.style.transition = 'background 3s';
  document.body.style.background = '#fff';
  await sleep(5000);
  clearStage();
  showText('ここは——', 'small-text', {color:'#999'});
  await sleep(3000);
  clearStage();
  await sleep(6000);

  // ⑤D 確認
  await sleep(3000);
  showText('被験者管理記録 更新', 'system-text');
  await sleep(3000);
  clearStage();
  showText('S-012 | 悠具志 業', 'system-text');
  await sleep(3000);
  clearStage();
  showText('状態：——意識回復', 'green-text', {fontSize:'1.1rem'});
  await sleep(3000);
  clearStage();

  // ⑤E ホワイトアウト
  await sleep(2000);

  // ⑥ 余韻
  var chime = new Audio('sound/clear_chime.mp3');
  chime.volume = 0.04;
  chime.play().catch(function(){});
  await sleep(3000);

  var yay = new Audio('sound/clear_yay.mp3');
  yay.volume = 0.02;
  yay.play().catch(function(){});
  await sleep(7000);

  // 歓声を普通にフェードアウト（歪まない）
  var fadeInterval = setInterval(function() {
    if (yay.volume > 0.002) {
      yay.volume -= 0.001;
    } else {
      clearInterval(fadeInterval);
      yay.pause();
    }
  }, 100);
  await sleep(3000);

  // NIGHT 6 COMPLETE + おめでとう！
  document.body.style.transition = 'background 2s';
  document.body.style.background = '#000';
  await sleep(2000);

  var clearMsg = document.createElement('div');
  clearMsg.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;';
  clearMsg.innerHTML = '<p style="font-family:\'Courier New\',monospace;font-size:1.4rem;color:#e8e4dc;letter-spacing:0.15em;margin-bottom:20px;opacity:0;transition:opacity 2s;" id="n6title">NIGHT 6 COMPLETE</p><p style="font-family:\'Courier New\',monospace;font-size:1rem;color:#aaa;letter-spacing:0.1em;opacity:0;transition:opacity 2s;" id="n6msg">おめでとう！</p>';
  document.body.appendChild(clearMsg);

  await sleep(500);
  document.getElementById('n6title').style.opacity = '1';
  await sleep(2000);
  document.getElementById('n6msg').style.opacity = '1';
  await sleep(5000);

  // カスタムナイトへ遷移
  window.location.href = 'custom_night.html';
}

window.addEventListener('load', function(){ setTimeout(trueEnding, 500); });
</script>
</body>
</html>
